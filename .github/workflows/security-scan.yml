name: Security Scan

on:
  pull_request:
    paths:
      - 'backend/package.json'
      - 'frontend/package.json'
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/security-scan.yml'
      - '.github/workflows/codeql.yml'
  push:
    branches:
      - integration
    paths:
      - 'backend/package.json'
      - 'frontend/package.json'
      - 'backend/package-lock.json'
      - 'frontend/package-lock.json'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/security-scan.yml'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.project }} --ignore-scripts

      - name: Audit dependencies
        run: npm audit --prefix ${{ matrix.project }} --audit-level=high

  trivy-filesystem:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: table
          exit-code: '1'

  sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --prefix backend --ignore-scripts
          npm ci --prefix frontend --ignore-scripts

      - name: Generate SBOM files
        run: |
          npm sbom --prefix backend --sbom-format spdx > backend-sbom.spdx.json
          npm sbom --prefix frontend --sbom-format spdx > frontend-sbom.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-files
          path: |
            backend-sbom.spdx.json
            frontend-sbom.spdx.json
